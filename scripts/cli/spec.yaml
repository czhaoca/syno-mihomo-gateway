# spec.yaml - the machine-readable contract for scripts/gateway.sh.
#
# SINGLE SOURCE OF TRUTH for the CLI surface: verbs, options, guardrails, exit
# codes, and output shapes, with every human string in English AND Chinese.
# The committed artifacts regenerate from here (never hand-edit them):
#   python3 scripts/ci/cli_contract_check.py --write
# writes scripts/lib/help.sh, docs/cli.md, docs/zh/cli.md, docs/CLI.txt,
# docs/CLI.zh.txt; the bare invocation is the CI freshness gate.

meta:
  name: gateway.sh
  invocation: "sh ./scripts/gateway.sh <verb> [options]"
  summary:
    en: >-
      Non-interactive command surface for the Mihomo transparent-proxy gateway
      on Synology DSM. Other procedures (DSM Task Scheduler, scripts, CI) call
      these verbs directly; the interactive installer (sh ./install.sh) is the
      guided front-end over the same functions.
    zh: >-
      Synology DSM 上 Mihomo 透明代理网关的非交互命令入口。其他程序（DSM
      任务计划、脚本、CI）可直接调用这些子命令；交互式安装器（sh ./install.sh）
      是基于同一套函数的向导前端。
  logs:
    en: >-
      Logs: gateway.sh writes <data-dir>/logs/gateway.log (lines carry verb=
      and run= fields). Direct auto_update.sh runs write auto-update.log -
      a link to gateway.log when gateway.sh ran first, otherwise a separate
      file - without those fields.
    zh: >-
      日志：gateway.sh 写入 <data-dir>/logs/gateway.log（每行携带 verb= 与
      run= 字段）。直接运行 auto_update.sh 写入 auto-update.log——若
      gateway.sh 先运行过，它是指向 gateway.log 的链接，否则是独立文件，且不带这两个字段。

guardrails:
  - en: >-
      Mutating verbs (deploy, redeploy, modify, update, cron --apply-crontab)
      require an explicit --yes; without it they exit 7 and change nothing.
    zh: >-
      变更类子命令（deploy、redeploy、modify、update、cron --apply-crontab）
      必须显式传入 --yes；否则以退出码 7 结束且不做任何更改。
  - en: "Mutating verbs require root (exit 6 otherwise); status and doctor do not."
    zh: "变更类子命令需要 root 权限（否则退出码 6）；status 与 doctor 不需要。"
  - en: >-
      --dry-run never mutates the gateway or any container and needs neither
      --yes nor root (update --dry-run still pulls images into the local
      cache - that is its job).
    zh: >-
      --dry-run 绝不更改网关或任何容器，也不需要 --yes 或 root（update
      --dry-run 仍会把镜像拉取到本地缓存——这正是它的用途）。
  - en: >-
      Every verb accepts --help/-h for its own help; -y is a short alias
      for --yes.
    zh: "每个子命令都接受 --help/-h 查看其帮助；-y 是 --yes 的短别名。"
  - en: >-
      Secrets are never accepted on the command line (argv is visible in ps) -
      set them in .env.
    zh: "命令行绝不接受机密参数（argv 在 ps 中可见）——请写入 .env。"
  - en: >-
      --json (status and doctor only) prints exactly one JSON object on stdout;
      every log line goes to the log file and stderr.
    zh: >-
      --json（仅 status 与 doctor）在标准输出只打印一个 JSON 对象；
      所有日志写入日志文件与标准错误。

exit_codes:
  - code: 0
    name: EXIT_OK
    en: success or clean no-op
    zh: 成功或无事可做
  - code: 2
    name: EXIT_PARTIAL
    en: one component failed, others applied
    zh: 部分组件失败，其余已应用
  - code: 3
    name: EXIT_CONFIG
    en: config / preflight error - nothing changed
    zh: 配置或预检错误——未做任何更改
  - code: 4
    name: EXIT_LOCKED
    en: another run holds the lock
    zh: 另一个运行实例持有锁
  - code: 5
    name: EXIT_LOGIN
    en: registry login failed - nothing attempted
    zh: 镜像仓库登录失败——未执行任何操作
  - code: 6
    name: EXIT_ROOT
    en: this verb needs root - nothing changed
    zh: 该子命令需要 root——未做任何更改
  - code: 7
    name: EXIT_CONFIRM
    en: mutating verb refused without an explicit --yes - nothing changed
    zh: 变更类子命令缺少显式 --yes 被拒绝——未做任何更改

verbs:
  - name: deploy
    mutating: true
    summary:
      en: Bring the gateway up end-to-end from the saved .env (derives image refs when absent).
      zh: 依据已保存的 .env 端到端部署网关（缺少镜像引用时自动推导）。
    options:
      - flag: "--cleanup-containers preserve|auto"
        en: what to do with existing gateway containers before deploying (default preserve)
        zh: 部署前如何处理已存在的网关容器（默认 preserve）
      - flag: "--cleanup-network preserve|auto"
        en: what to do with an existing tproxy network before deploying (default preserve)
        zh: 部署前如何处理已存在的 tproxy 网络（默认 preserve）
      - flag: "--interface IFACE"
        en: LAN parent interface for the macvlan (persisted to .env)
        zh: macvlan 的 LAN 父接口（会持久化到 .env）
      - flag: "--yes"
        en: confirm the mutation (required when actually deploying)
        zh: 确认执行变更（真正部署时必须）
      - flag: "--dry-run"
        en: print the deployment plan and exit without changing anything
        zh: 打印部署计划后退出，不做任何更改
    notes:
      - en: >-
          Pipeline: validate config -> preflight -> plan cleanup -> pull +
          validate images -> apply cleanup -> network -> compose up + health
          gate (auto-rollback to the last-good images on failure).
        zh: >-
          流程：校验配置 -> 预检 -> 规划清理 -> 拉取并校验镜像 -> 执行清理 ->
          网络 -> compose 启动 + 健康门（失败时自动回滚到最近可用镜像）。

  - name: redeploy
    mutating: true
    summary:
      en: Deploy strictly from the saved, complete .env (never derives or prompts).
      zh: 严格依据完整的已保存 .env 重新部署（绝不推导或询问）。
    options:
      - flag: "--cleanup-containers preserve|auto"
        en: same as deploy
        zh: 同 deploy
      - flag: "--cleanup-network preserve|auto"
        en: same as deploy
        zh: 同 deploy
      - flag: "--interface IFACE"
        en: same as deploy
        zh: 同 deploy
      - flag: "--yes"
        en: confirm the mutation
        zh: 确认执行变更
      - flag: "--dry-run"
        en: print the plan and exit without changing anything
        zh: 打印计划后退出，不做任何更改

  - name: modify
    mutating: true
    summary:
      en: Change one thing, then re-apply the full fail-closed pipeline.
      zh: 修改一项配置，然后重新执行完整的失败即停流水线。
    options:
      - flag: "--network"
        en: re-apply the network (TUN device + macvlan) from the saved settings
        zh: 依据已保存的设置重建网络（TUN 设备 + macvlan）
      - flag: "--images"
        en: re-derive the image refs and redeploy with them
        zh: 重新推导镜像引用并以其重新部署
      - flag: "--mihomo-tag TAG"
        en: with --images, pin the mihomo tag (persisted to .env)
        zh: 与 --images 连用，固定 mihomo 标签（持久化到 .env）
      - flag: "--metacubexd-tag TAG"
        en: with --images, pin the metacubexd tag (persisted to .env)
        zh: 与 --images 连用，固定 metacubexd 标签（持久化到 .env）
      - flag: "--subscription URL"
        en: replace the stored subscription URL (cleaned + validated first)
        zh: 替换已存储的订阅 URL（先清洗并校验）
      - flag: "--cleanup-containers preserve|auto"
        en: same as deploy
        zh: 同 deploy
      - flag: "--cleanup-network preserve|auto"
        en: same as deploy
        zh: 同 deploy
      - flag: "--yes"
        en: confirm the mutation
        zh: 确认执行变更
      - flag: "--dry-run"
        en: validate the change and print the plan without applying it
        zh: 校验变更并打印计划，但不执行

  - name: cron
    mutating: false
    summary:
      en: Persist the auto-update schedule; optionally write a crontab entry.
      zh: 持久化自动更新计划；可选写入 crontab 条目。
    options:
      - flag: "--time HH:MM"
        en: daily update time (24h clock; becomes a five-field cron expression)
        zh: 每日更新时间（24 小时制；转换为五段 cron 表达式）
      - flag: "--schedule 'M H * * *'"
        en: a full five-field cron expression (validated)
        zh: 完整的五段 cron 表达式（会校验）
      - flag: "--tz ZONE"
        en: >-
          sets UPDATE_TZ, which only labels the updater's log timestamps -
          DSM Task Scheduler and crontab fire on the NAS SYSTEM timezone
          (Control Panel > Regional Options)
        zh: >-
          设置 UPDATE_TZ——仅用于更新器日志时间戳；DSM 任务计划与 crontab
          按 NAS 系统时区（控制面板 > 区域选项）触发
      - flag: "--enable"
        en: set UPDATE_ENABLED=true
        zh: 设置 UPDATE_ENABLED=true
      - flag: "--disable"
        en: set UPDATE_ENABLED=false
        zh: 设置 UPDATE_ENABLED=false
      - flag: "--apply-crontab"
        en: append the entry to the system crontab (mutating - needs --yes and root)
        zh: 将条目追加到系统 crontab（属变更操作——需要 --yes 与 root）
    notes:
      - en: >-
          Without --apply-crontab the verb only writes .env and prints the DSM
          Task Scheduler command to schedule (the recommended, DSM-native path).
        zh: >-
          不带 --apply-crontab 时仅写入 .env 并打印用于 DSM 任务计划的命令
          （推荐的 DSM 原生方式）。
      - en: >-
          Needs an existing .env (deploy first). When --time and --schedule
          are both given, --time wins. --apply-crontab manages its own entry:
          a changed schedule replaces the previous auto_update.sh line.
        zh: >-
          需要已存在的 .env（先部署）。--time 与 --schedule 同时给出时以
          --time 为准。--apply-crontab 管理自己的条目：计划变更会替换旧的
          auto_update.sh 行。

  - name: status
    mutating: false
    summary:
      en: Read-only deployment state (stack, containers, network, dashboard URL).
      zh: 只读的部署状态（栈、容器、网络、面板地址）。
    options:
      - flag: "--json"
        en: emit one machine-readable JSON object on stdout
        zh: 在标准输出打印一个机器可读的 JSON 对象
    notes:
      - en: >-
          Exits 2 (ok:false) when docker/compose is unavailable or .env is
          malformed - the JSON object is still emitted; else 0.
        zh: >-
          当 docker/compose 不可用或 .env 损坏时以退出码 2（ok:false）结束——
          JSON 对象仍会输出；否则为 0。

  - name: doctor
    mutating: false
    summary:
      en: >-
        Read-only diagnostics (exit 0 healthy / 2 degraded / 3 broken). Human
        mode runs scripts/doctor.sh; --json runs the same check set natively.
      zh: >-
        只读诊断（退出码 0 健康 / 2 降级 / 3 故障）。人读模式运行
        scripts/doctor.sh；--json 以同一套检查原生输出。
    options:
      - flag: "--json"
        en: emit one machine-readable JSON object on stdout (--egress is human-mode only)
        zh: 在标准输出打印一个机器可读的 JSON 对象（--egress 仅人读模式生效）
      - flag: "--egress"
        en: also probe real proxy egress through the controller API
        zh: 另通过控制器 API 探测真实的代理出口

  - name: update
    mutating: true
    summary:
      en: Run the unattended updater (execs scripts/auto_update.sh; args pass through) or manage its generic targets.
      zh: 运行无人值守更新器（转交 scripts/auto_update.sh；参数原样透传），或管理其通用更新目标。
    options:
      - flag: "--yes"
        en: confirm the mutation (not forwarded)
        zh: 确认执行变更（不透传）
      - flag: "--dry-run"
        en: pull + detect + report without swapping anything (forwarded)
        zh: 拉取、检测并报告，但不替换任何组件（透传）
      - flag: "--force"
        en: ignore the UPDATE_ENABLED=false kill-switch (forwarded)
        zh: 忽略 UPDATE_ENABLED=false 开关（透传）
      - flag: "--list-targets"
        en: read-only, no --yes/root; list enrolled generic targets and their eligibility
        zh: 只读，无需 --yes/root；列出已登记的通用更新目标及其可用性
      - flag: "--last"
        en: read-only, no --yes/root; show the outcome of the last updater run
        zh: 只读，无需 --yes/root；显示最近一次更新运行的结果
      - flag: "--enable NAME"
        en: >-
          enroll a container for generic auto-update (writes the managed list
          only; warns when NAME is not running or does not exist yet, and
          when the image looks like a database - recreate has no quiesce)
        zh: >-
          将容器登记为通用自动更新目标（仅写入管理列表；当 NAME 未运行或尚不
          存在时会警告，镜像疑似数据库时也会警告——原地重建没有静默期）
      - flag: "--disable NAME"
        en: remove a container from generic auto-update (writes the managed list only)
        zh: 将一个容器从通用自动更新中移除（仅写入管理列表）
    notes:
      - en: >-
          --list-targets/--last/--enable/--disable are handled locally and
          reject any other flag; --dry-run cannot combine with them (it
          would bypass the --yes/root gates that protect the managed list).
        zh: >-
          --list-targets/--last/--enable/--disable 在本地处理并拒绝其他任何
          选项；--dry-run 不能与其组合（否则会绕过保护管理列表的 --yes/root
          门槛）。

json_output:
  en: >-
    status --json emits one flat object:
    {"verb","ok","exit_code","stack_state","mihomo_ip","dashboard_url",
    "checks":[{"name","value"},...],"last_update":{...}|null}
    (last_update mirrors state/last-run.json; null before the first run).
    Its check names are env, docker, mihomo_container, ui_container,
    network, subscription, tun_enable. last-run.json carries
    {"ts","exit_code","dry_run","updated","unchanged","failed",
    "rolled_back","updated_names","failed_names","rolled_back_names"}.
    doctor --json emits {"verb","ok","exit_code","checks":[...]} with
    check names env, docker, arch, tun_device, network, compose, mihomo,
    tun_gateway, controller, image_arch, dashboard, update_task, boot_task,
    cloudflared, subscription, host_dns, geodata, dns_privacy, ipv6_bypass
    (update_task/boot_task verify the DSM Task Scheduler deployment;
    cloudflared is ok|down|absent for the optional tunnel container;
    host_dns probes every host resolver; geodata is cached|missing;
    dns_privacy is v2|v1|legacy for the rendered DNS profile - v2 =
    split-horizon foreign-by-default, v1 = a pre-v1.3.10 render whose
    fallback dual-query still copies long-tail lookups to the domestic
    resolvers, legacy = the domestic resolvers see every lookup;
    ipv6_bypass is ok|exposed - exposed means internet-routable global
    IPv6 (not a private ULA) is live on the LAN interface, a path
    dual-stack clients use around the IPv4-only gateway; "unknown" means
    the surface is not probeable on this box).
    Exactly one object on stdout; logs never interleave.
  zh: >-
    status --json 输出一个扁平对象：
    {"verb","ok","exit_code","stack_state","mihomo_ip","dashboard_url",
    "checks":[{"name","value"},...],"last_update":{...}|null}
    （last_update 与 state/last-run.json 一致；首次运行前为 null）。
    其检查名为 env、docker、mihomo_container、ui_container、network、
    subscription、tun_enable。last-run.json 携带
    {"ts","exit_code","dry_run","updated","unchanged","failed",
    "rolled_back","updated_names","failed_names","rolled_back_names"}。
    doctor --json 输出 {"verb","ok","exit_code","checks":[...]}，检查名为
    env、docker、arch、tun_device、network、compose、mihomo、tun_gateway、
    controller、image_arch、dashboard、update_task、boot_task、cloudflared、
    subscription、host_dns、geodata、dns_privacy、
    ipv6_bypass（update_task/boot_task
    校验 DSM 任务计划的部署情况；cloudflared 对可选的隧道容器报告
    ok|down|absent；host_dns 逐一探测主机解析器；geodata 为
    cached|missing；dns_privacy 反映渲染出的 DNS 配置档，取值
    v2|v1|legacy —— v2 = 分域（境外优先）隐私模式，v1 = v1.3.10 之前的
    渲染残留（fallback 双查询仍会把长尾查询抄送国内解析器），legacy =
    国内解析器可见全部查询；ipv6_bypass 取值 ok|exposed —— exposed
    表示 LAN 接口上存在可路由互联网的全局 IPv6（私有 ULA 不算），
    双栈客户端会经 IPv6 绕过纯 IPv4
    网关；"unknown" 表示此机器上该项不可探测）。
    标准输出只有这一个对象，日志绝不混入。
