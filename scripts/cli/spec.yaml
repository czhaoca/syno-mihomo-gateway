# spec.yaml - the machine-readable contract for scripts/gateway.sh.
#
# SINGLE SOURCE OF TRUTH for the CLI surface: verbs, options, guardrails, exit
# codes, and output shapes, with every human string in English AND Chinese.
# The committed artifacts regenerate from here (never hand-edit them):
#   python3 scripts/ci/cli_contract_check.py --write
# writes scripts/lib/help.sh, docs/cli.md, docs/zh/cli.md, docs/CLI.txt,
# docs/CLI.zh.txt; the bare invocation is the CI freshness gate.

meta:
  name: gateway.sh
  invocation: "sh ./scripts/gateway.sh <verb> [options]"
  summary:
    en: >-
      Non-interactive command surface for the Mihomo transparent-proxy gateway
      on Synology DSM. Other procedures (DSM Task Scheduler, scripts, CI) call
      these verbs directly; the interactive installer (sh ./install.sh) is the
      guided front-end over the same functions.
    zh: >-
      Synology DSM 上 Mihomo 透明代理网关的非交互命令入口。其他程序（DSM
      任务计划、脚本、CI）可直接调用这些子命令；交互式安装器（sh ./install.sh）
      是基于同一套函数的向导前端。
  logs:
    en: "Logs: <data-dir>/logs/gateway.log (every line carries verb= and run= fields)."
    zh: "日志：<data-dir>/logs/gateway.log（每行携带 verb= 与 run= 字段）。"

guardrails:
  - en: >-
      Mutating verbs (deploy, redeploy, modify, update, cron --apply-crontab)
      require an explicit --yes; without it they exit 7 and change nothing.
    zh: >-
      变更类子命令（deploy、redeploy、modify、update、cron --apply-crontab）
      必须显式传入 --yes；否则以退出码 7 结束且不做任何更改。
  - en: "Mutating verbs require root (exit 6 otherwise); status and doctor do not."
    zh: "变更类子命令需要 root 权限（否则退出码 6）；status 与 doctor 不需要。"
  - en: "--dry-run never mutates anything and needs neither --yes nor root."
    zh: "--dry-run 绝不做任何更改，也不需要 --yes 或 root。"
  - en: >-
      Secrets are never accepted on the command line (argv is visible in ps) -
      set them in .env.
    zh: "命令行绝不接受机密参数（argv 在 ps 中可见）——请写入 .env。"
  - en: >-
      --json (status and doctor only) prints exactly one JSON object on stdout;
      every log line goes to the log file and stderr.
    zh: >-
      --json（仅 status 与 doctor）在标准输出只打印一个 JSON 对象；
      所有日志写入日志文件与标准错误。

exit_codes:
  - code: 0
    name: EXIT_OK
    en: success or clean no-op
    zh: 成功或无事可做
  - code: 2
    name: EXIT_PARTIAL
    en: one component failed, others applied
    zh: 部分组件失败，其余已应用
  - code: 3
    name: EXIT_CONFIG
    en: config / preflight error - nothing changed
    zh: 配置或预检错误——未做任何更改
  - code: 4
    name: EXIT_LOCKED
    en: another run holds the lock
    zh: 另一个运行实例持有锁
  - code: 5
    name: EXIT_LOGIN
    en: registry login failed - nothing attempted
    zh: 镜像仓库登录失败——未执行任何操作
  - code: 6
    name: EXIT_ROOT
    en: this verb needs root - nothing changed
    zh: 该子命令需要 root——未做任何更改
  - code: 7
    name: EXIT_CONFIRM
    en: mutating verb refused without an explicit --yes - nothing changed
    zh: 变更类子命令缺少显式 --yes 被拒绝——未做任何更改

verbs:
  - name: deploy
    mutating: true
    summary:
      en: Bring the gateway up end-to-end from the saved .env (derives image refs when absent).
      zh: 依据已保存的 .env 端到端部署网关（缺少镜像引用时自动推导）。
    options:
      - flag: "--cleanup-containers preserve|auto"
        en: what to do with existing gateway containers before deploying (default preserve)
        zh: 部署前如何处理已存在的网关容器（默认 preserve）
      - flag: "--cleanup-network preserve|auto"
        en: what to do with an existing tproxy network before deploying (default preserve)
        zh: 部署前如何处理已存在的 tproxy 网络（默认 preserve）
      - flag: "--interface IFACE"
        en: LAN parent interface for the macvlan (persisted to .env)
        zh: macvlan 的 LAN 父接口（会持久化到 .env）
      - flag: "--yes"
        en: confirm the mutation (required when actually deploying)
        zh: 确认执行变更（真正部署时必须）
      - flag: "--dry-run"
        en: print the deployment plan and exit without changing anything
        zh: 打印部署计划后退出，不做任何更改
    notes:
      - en: >-
          Pipeline: validate config -> preflight -> plan cleanup -> pull +
          validate images -> apply cleanup -> network -> compose up + health
          gate (auto-rollback to the last-good images on failure).
        zh: >-
          流程：校验配置 -> 预检 -> 规划清理 -> 拉取并校验镜像 -> 执行清理 ->
          网络 -> compose 启动 + 健康门（失败时自动回滚到最近可用镜像）。

  - name: redeploy
    mutating: true
    summary:
      en: Deploy strictly from the saved, complete .env (never derives or prompts).
      zh: 严格依据完整的已保存 .env 重新部署（绝不推导或询问）。
    options:
      - flag: "--cleanup-containers preserve|auto"
        en: same as deploy
        zh: 同 deploy
      - flag: "--cleanup-network preserve|auto"
        en: same as deploy
        zh: 同 deploy
      - flag: "--interface IFACE"
        en: same as deploy
        zh: 同 deploy
      - flag: "--yes"
        en: confirm the mutation
        zh: 确认执行变更
      - flag: "--dry-run"
        en: print the plan and exit without changing anything
        zh: 打印计划后退出，不做任何更改

  - name: modify
    mutating: true
    summary:
      en: Change one thing, then re-apply the full fail-closed pipeline.
      zh: 修改一项配置，然后重新执行完整的失败即停流水线。
    options:
      - flag: "--network"
        en: re-apply the network (TUN device + macvlan) from the saved settings
        zh: 依据已保存的设置重建网络（TUN 设备 + macvlan）
      - flag: "--images"
        en: re-derive the image refs and redeploy with them
        zh: 重新推导镜像引用并以其重新部署
      - flag: "--mihomo-tag TAG"
        en: with --images, pin the mihomo tag (persisted to .env)
        zh: 与 --images 连用，固定 mihomo 标签（持久化到 .env）
      - flag: "--metacubexd-tag TAG"
        en: with --images, pin the metacubexd tag (persisted to .env)
        zh: 与 --images 连用，固定 metacubexd 标签（持久化到 .env）
      - flag: "--subscription URL"
        en: replace the stored subscription URL (cleaned + validated first)
        zh: 替换已存储的订阅 URL（先清洗并校验）
      - flag: "--cleanup-containers preserve|auto"
        en: same as deploy
        zh: 同 deploy
      - flag: "--cleanup-network preserve|auto"
        en: same as deploy
        zh: 同 deploy
      - flag: "--yes"
        en: confirm the mutation
        zh: 确认执行变更
      - flag: "--dry-run"
        en: validate the change and print the plan without applying it
        zh: 校验变更并打印计划，但不执行

  - name: cron
    mutating: false
    summary:
      en: Persist the auto-update schedule; optionally write a crontab entry.
      zh: 持久化自动更新计划；可选写入 crontab 条目。
    options:
      - flag: "--time HH:MM"
        en: daily update time (24h clock; becomes a five-field cron expression)
        zh: 每日更新时间（24 小时制；转换为五段 cron 表达式）
      - flag: "--schedule 'M H * * *'"
        en: a full five-field cron expression (validated)
        zh: 完整的五段 cron 表达式（会校验）
      - flag: "--tz ZONE"
        en: timezone the schedule runs in (e.g. Asia/Shanghai, UTC)
        zh: 计划运行的时区（如 Asia/Shanghai、UTC）
      - flag: "--enable"
        en: set UPDATE_ENABLED=true
        zh: 设置 UPDATE_ENABLED=true
      - flag: "--disable"
        en: set UPDATE_ENABLED=false
        zh: 设置 UPDATE_ENABLED=false
      - flag: "--apply-crontab"
        en: append the entry to the system crontab (mutating - needs --yes and root)
        zh: 将条目追加到系统 crontab（属变更操作——需要 --yes 与 root）
    notes:
      - en: >-
          Without --apply-crontab the verb only writes .env and prints the DSM
          Task Scheduler command to schedule (the recommended, DSM-native path).
        zh: >-
          不带 --apply-crontab 时仅写入 .env 并打印用于 DSM 任务计划的命令
          （推荐的 DSM 原生方式）。

  - name: status
    mutating: false
    summary:
      en: Read-only deployment state (stack, containers, network, dashboard URL).
      zh: 只读的部署状态（栈、容器、网络、面板地址）。
    options:
      - flag: "--json"
        en: emit one machine-readable JSON object on stdout
        zh: 在标准输出打印一个机器可读的 JSON 对象

  - name: doctor
    mutating: false
    summary:
      en: Read-only diagnostics (wraps scripts/doctor.sh; exit 0 healthy / 2 degraded / 3 broken).
      zh: 只读诊断（封装 scripts/doctor.sh；退出码 0 健康 / 2 降级 / 3 故障）。
    options:
      - flag: "--json"
        en: emit one machine-readable JSON object on stdout (--egress is human-mode only)
        zh: 在标准输出打印一个机器可读的 JSON 对象（--egress 仅人读模式生效）
      - flag: "--egress"
        en: also probe real proxy egress through the controller API
        zh: 另通过控制器 API 探测真实的代理出口

  - name: update
    mutating: true
    summary:
      en: Run the unattended updater (execs scripts/auto_update.sh; args pass through).
      zh: 运行无人值守更新器（转交 scripts/auto_update.sh；参数原样透传）。
    options:
      - flag: "--yes"
        en: confirm the mutation (not forwarded)
        zh: 确认执行变更（不透传）
      - flag: "--dry-run"
        en: pull + detect + report without swapping anything (forwarded)
        zh: 拉取、检测并报告，但不替换任何组件（透传）
      - flag: "--force"
        en: ignore the UPDATE_ENABLED=false kill-switch (forwarded)
        zh: 忽略 UPDATE_ENABLED=false 开关（透传）

json_output:
  en: >-
    status --json emits one flat object:
    {"verb","ok","exit_code","stack_state","mihomo_ip","dashboard_url",
    "checks":[{"name","value"},...]}. doctor --json emits
    {"verb","ok","exit_code","checks":[...]}. Exactly one object on stdout;
    logs never interleave.
  zh: >-
    status --json 输出一个扁平对象：
    {"verb","ok","exit_code","stack_state","mihomo_ip","dashboard_url",
    "checks":[{"name","value"},...]}。doctor --json 输出
    {"verb","ok","exit_code","checks":[...]}。标准输出只有这一个对象，
    日志绝不混入。
