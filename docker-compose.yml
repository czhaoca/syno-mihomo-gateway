services:
  mihomo:
    # Resolved from .env (the installer sets it from REGISTRY_MODE). The ':?' form
    # makes `docker compose up` FAIL if MIHOMO_IMAGE is unset, so the gateway never
    # silently pulls an unexpected image.
    image: ${MIHOMO_IMAGE:?set MIHOMO_IMAGE in .env - run ./install.sh}
    container_name: mihomo
    restart: always
    networks:
      tproxy_network:
        ipv4_address: ${MIHOMO_IP}
    privileged: true
    volumes:
      # Runtime config is outside the replaceable release directory. The tracked
      # template stays release-owned and is mounted separately read-only.
      - ${GATEWAY_DATA_DIR:-../syno-mihomo-gateway-data}/config:/root/.config/mihomo
      - ./config/config.template.yaml:/etc/syno-mihomo/config.template.yaml:ro
      - ./scripts:/scripts:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      # Bake TUN in so it survives a recreate even if the host mknod from
      # setup_network.sh was lost on reboot.
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      - TZ=${TZ}
      # Consumed by scripts/render_config.sh to render config.yaml from the template.
      - CONTROLLER_PORT=${CONTROLLER_PORT}
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - DNS_DEFAULT_NAMESERVER=${DNS_DEFAULT_NAMESERVER}
      - DNS_NAMESERVER=${DNS_NAMESERVER}
      # Split-horizon DNS pair (REQUIRED - v2 is the only profile) + GEOIP
      # no-resolve opt-in. The ':-' defaults keep compose warning-free on a
      # stale pre-v2 .env; the RENDERER owns the loud failure (a missing
      # pair refuses to render and the entrypoint gate keeps the previous
      # config running).
      - DNS_CN_NAMESERVER=${DNS_CN_NAMESERVER:-}
      - DNS_FOREIGN_NAMESERVER=${DNS_FOREIGN_NAMESERVER:-}
      - DNS_GEOIP_NO_RESOLVE=${DNS_GEOIP_NO_RESOLVE:-false}
      - SNIFFER_ENABLE=${SNIFFER_ENABLE:-false}
      # Retirement tripwires (group-model streamline; the #40 DEC-B
      # fail-loud pattern): the Priority Nodes category was removed, and
      # these are passed through ONLY so the renderer refuses loudly when a
      # stale .env still sets a retired knob - never a silent route change.
      - PRIORITY_INCLUDE_FILTER=${PRIORITY_INCLUDE_FILTER:-}
      - PRIORITY_EXCLUDE_FILTER=${PRIORITY_EXCLUDE_FILTER:-}
      - AUTO_EXCLUDE_FILTER=${AUTO_EXCLUDE_FILTER:-}
      # Per-country auto-selection groups ('NAME=regex;...' spec) - REQUIRED:
      # Exit Country's members ARE the generated groups, so the renderer
      # refuses an unset/empty spec (the ':-' keeps compose warning-free; the
      # renderer owns the loud failure and the entrypoint gate keeps the
      # previous config running).
      - COUNTRY_GROUPS=${COUNTRY_GROUPS:-}
      # Per-device full-proxy band (OPTIONAL - renders the Full-Tunnel Devices group
      # + SRC-IP-CIDR rules only when set; empty is byte-identical to
      # unset, so existing .envs are untouched).
      - FULL_PROXY_SOURCES=${FULL_PROXY_SOURCES:-}
      # Transparent-gateway TUN is ON by default (stack: system keeps the controller
      # reachable - mihomo #1493). LAN devices set their gateway + DNS to MIHOMO_IP and
      # route through mihomo. Set TUN_ENABLE=false in .env to run as a plain proxy.
      - TUN_ENABLE=${TUN_ENABLE:-true}
      # Only consulted when TUN_ENABLE=true: optional Linux TCP redirect optimization.
      - TUN_AUTO_REDIRECT=${TUN_AUTO_REDIRECT:-false}
      - MIHOMO_TEMPLATE=/etc/syno-mihomo/config.template.yaml

    # Entrypoint: render to a TEMP config via the shared, CI-tested renderer,
    # gate it with `mihomo -t`, and swap it over the live config.yaml only on
    # green. A hand-edited .env that poisons the render (an invalid
    # COUNTRY_GROUPS pattern that would panic mihomo at startup, a missing
    # required knob, a dangling '#group' DNS detour, or a stale retired knob
    # tripping the wire above) can no longer crash-loop the gateway or
    # destroy the last-good config: the previous config keeps running and
    # .config.yaml.rejected marks the rejection. First boot with a bad
    # config still fails hard. See scripts/mihomo_entrypoint.sh and
    # docs/development.md.
    entrypoint:
      - /bin/sh
      - /scripts/mihomo_entrypoint.sh

  metacubexd:
    # Same as mihomo: resolved from .env, fail-closed if unset.
    image: ${METACUBEXD_IMAGE:?set METACUBEXD_IMAGE in .env - run ./install.sh}
    container_name: mihomo-ui
    restart: always
    network_mode: bridge
    ports:
      - "${WEB_UI_PORT}:80"
    depends_on:
      - mihomo

networks:
  tproxy_network:
    external: true
