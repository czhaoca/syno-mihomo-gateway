services:
  mihomo:
    image: ${MIHOMO_IMAGE:-metacubex/mihomo:latest}
    container_name: mihomo
    restart: always
    networks:
      tproxy_network:
        ipv4_address: ${MIHOMO_IP}
    privileged: true
    volumes:
      - ./config:/root/.config/mihomo
      - ./scripts:/scripts:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      # Bake TUN in so it survives a recreate even if the host mknod from
      # setup_network.sh was lost on reboot.
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
    environment:
      - TZ=${TZ}
      # Consumed by scripts/render_config.sh to render config.yaml from the template.
      - CONTROLLER_PORT=${CONTROLLER_PORT}
      - CONTROLLER_SECRET=${CONTROLLER_SECRET}
      - DNS_DEFAULT_NAMESERVER=${DNS_DEFAULT_NAMESERVER}
      - DNS_NAMESERVER=${DNS_NAMESERVER}
      - DNS_FALLBACK=${DNS_FALLBACK}

    # Entrypoint: render config.yaml from the template (subscription URL + env tokens)
    # via the shared, CI-tested renderer, then start Mihomo. The renderer fails loudly
    # on an empty/garbled subscription URL or missing DNS, so a poisoned config never
    # reaches mihomo (and the updater's health gate catches a bad start). See
    # scripts/render_config.sh and docs/development.md.
    entrypoint:
      - /bin/sh
      - -c
      - sh /scripts/render_config.sh && exec /mihomo

  metacubexd:
    image: ${METACUBEXD_IMAGE:-ghcr.io/metacubex/metacubexd:latest}
    container_name: mihomo-ui
    restart: always
    network_mode: bridge
    ports:
      - "${WEB_UI_PORT}:80"
    depends_on:
      - mihomo

networks:
  tproxy_network:
    external: true
