# Syno Mihomo Gateway CI
when:
  event: [push, pull_request]
  branch: [main, master]

steps:
  - name: validate-compose
    image: docker/compose:latest
    commands:
      - docker compose config --quiet
    failure: ignore

  - name: validate-yaml
    image: python:3.12-slim
    commands:
      - pip install --quiet pyyaml
      - python -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"
      - echo "YAML validation passed"

  - name: render-config
    image: python:3.12-slim
    commands:
      # Renders config.template.yaml with .env.example, validates structure, and
      # enforces the CLAUDE.md "no hardcoded DNS/network address" rule.
      - pip install --quiet pyyaml
      - python scripts/ci/render_check.py

  - name: compose-policy
    image: python:3.12-slim
    commands:
      # Enforce ACR-only images: the gateway must never silently fall back to a direct
      # Docker Hub / ghcr.io pull (blocked in China). See docs/configuration.md.
      - pip install --quiet pyyaml
      - python scripts/ci/compose_policy_check.py

  - name: package-check
    image: python:3.12-slim
    commands:
      # Hermetic safeguard test: builds the release zip in a throwaway repo and proves it
      # can never ship a secret (.env / subscription / config.yaml), the guards fire, and
      # bootstrap.sh round-trips. Needs git to run the real packager.
      - apt-get update -qq && apt-get install -y -qq --no-install-recommends git >/dev/null
      - python scripts/ci/package_check.py

  - name: shellcheck
    image: koalaman/shellcheck-alpine:stable
    commands:
      # -x follows the sourced lib/*.sh in-context (so cross-file vars resolve).
      # package.sh / bootstrap.sh are build-host + offline-install helpers (see
      # docs/release-packaging.md); the release zip itself is cut by `sh scripts/package.sh`
      # on a machine with GitHub access, not in CI.
      - shellcheck -x scripts/auto_update.sh scripts/install_scheduler.sh scripts/setup_network.sh scripts/render_config.sh scripts/package.sh bootstrap.sh
