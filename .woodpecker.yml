# Syno Mihomo Gateway CI
when:
  event: [push, pull_request]
  branch: [main, master]

steps:
  - name: validate-compose
    image: alpine:3.22
    commands:
      # Needs compose v2 (what DSM Container Manager and local dev run): the
      # deprecated docker/compose image is frozen at v1, which cannot parse the
      # fail-closed ${VAR:?msg} image refs the compose file uses deliberately.
      - apk add --no-cache -q docker-cli-compose
      - docker compose --env-file .env.example config --quiet

  - name: validate-yaml
    image: python:3.12-slim
    commands:
      - pip install --quiet pyyaml
      - python -c "import yaml; yaml.safe_load(open('docker-compose.yml'))"
      - echo "YAML validation passed"

  - name: render-config
    image: python:3.12-slim
    commands:
      # Renders config.template.yaml with .env.example, validates structure, and
      # enforces the CLAUDE.md "no hardcoded DNS/network address" rule.
      - pip install --quiet pyyaml
      - python scripts/ci/render_check.py

  - name: cli-contract
    image: python:3.12-slim
    commands:
      # The CLI contract: scripts/cli/spec.yaml is the source of truth; the
      # committed help.sh/cli.md(en+zh)/CLI.txt(en+zh) must regenerate
      # byte-identical, spec exit codes must match common.sh, and gateway.sh
      # --help must serve the spec text verbatim. Regenerate with --write.
      - pip install --quiet pyyaml
      - python scripts/ci/cli_contract_check.py

  - name: compose-policy
    image: python:3.12-slim
    commands:
      # Image-ref policy: every compose image is a fail-closed env ref (never a
      # hardcoded ref or default fallback), and .env.example ships REGISTRY_MODE=acr
      # (ACR is the default; 'docker' upstream is an explicit opt-in). The acr-vs-docker
      # choice itself lives in the gitignored .env. See docs/configuration.md.
      - pip install --quiet pyyaml
      - python scripts/ci/compose_policy_check.py

  - name: package-check
    image: python:3.12-slim
    commands:
      # Hermetic safeguard test: builds BOTH the dev and the enduser release bundles in
      # throwaway repos and proves neither can ship a secret (.env / subscription /
      # config.yaml); the enduser bundle also prunes every developer/.md/CI file, ships
      # the installer + .txt guides, contains no identity string, and its leak-gate fails
      # closed on an injected leak. Needs git to run the real packager.
      - apt-get update -qq && apt-get install -y -qq --no-install-recommends git >/dev/null
      - python scripts/ci/package_check.py

  - name: privacy-check
    image: python:3.12-slim
    commands:
      # Public project/GitHub and Shenzhen ACR references are allowed. Private
      # operational identifiers, credentials, and tracked runtime files are not.
      - apt-get update -qq && apt-get install -y -qq --no-install-recommends git >/dev/null
      - python scripts/ci/privacy_check.py
      - python scripts/ci/privacy_check_test.py

  - name: dsm-shell-tests
    image: alpine:3.22
    commands:
      - sh scripts/ci/dsm_installer_check.sh
      - sh scripts/ci/lifecycle_check.sh
      - sh scripts/ci/auto_update_check.sh
      - sh scripts/ci/cloudflared_check.sh
      - sh scripts/ci/generic_update_check.sh
      - sh scripts/ci/gateway_cli_check.sh
      - sh scripts/ci/migrate_legacy_check.sh
      - sh scripts/ci/seed_provider_check.sh
      - sh scripts/ci/proxy_groups_check.sh
      - sh scripts/ci/mihomo_entrypoint_check.sh
      - sh scripts/ci/pi_installer_check.sh
      - sh scripts/validate_release.sh --self-test

  - name: shellcheck
    image: koalaman/shellcheck-alpine:stable
    commands:
      # First parse-check every shell script, then lint the entry points with -x so the
      # sourced modules are analyzed in context: install.sh pulls in scripts/installer/*.sh
      # + scripts/lib/*.sh; auto_update.sh + setup_network.sh pull in their libs.
      # setup_network.sh is now POSIX /bin/sh (no more bash exception).
      - 'for f in $(find . -path ./.git -prune -o -name "*.sh" -print); do sh -n "$f" || exit 1; done'
      - shellcheck -x install.sh install-pi.sh scripts/gateway.sh scripts/auto_update.sh scripts/pi/auto_update_lite.sh scripts/pi/lite_ctl.sh scripts/install_scheduler.sh scripts/setup_network.sh scripts/render_config.sh scripts/mihomo_entrypoint.sh scripts/package.sh scripts/doctor.sh scripts/state_diff.sh scripts/migrate_legacy.sh scripts/seed_provider.sh bootstrap.sh scripts/lib/container.sh scripts/lib/targets.sh scripts/lib/geodata.sh scripts/validate_release.sh
