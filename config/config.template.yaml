# Mihomo Core Configuration Template
# Processed by the mihomo container entrypoint, which substitutes the placeholder
# tokens below from environment variables / subscription.txt and writes config.yaml.
#
# NOTE: per CLAUDE.md, no DNS servers / network addresses are hardcoded here —
# they come from .env (gitignored). Edit values in .env, not in this file.

port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7893
mixed-port: 7894
# Rule-based routing, and accept connections from other LAN hosts so devices can use
# mihomo as an explicit proxy (<MIHOMO_IP>:7890) in addition to the TUN gateway below.
mode: rule
allow-lan: true

# Transparent-gateway dataplane. ON by default (TUN_ENABLE=true) because the PURPOSE of
# this gateway is to let LAN devices point their gateway + DNS at mihomo's own IP and
# reach the internet through the airport. The renderer (scripts/render_config.sh) keeps
# the block when TUN_ENABLE=true and OMITS it when false (run as a plain proxy instead).
#
# CRITICAL: stack MUST be `system`. With `stack: mixed`/`gvisor` + auto-route, mihomo's
# policy routing HIJACKS the external-controller's reply packets, so the dashboard
# backend at ${MIHOMO_IP}:${CONTROLLER_PORT} times out (mihomo #1493). The `system`
# stack keeps the controller reachable from the LAN - this is the VERIFIED working
# configuration. auto-redirect stays opt-in (TUN_AUTO_REDIRECT, default false) because
# nft-backed iptables breaks on older DSM kernels.
# {{TUN_BEGIN}}
tun:
  enable: true
  stack: system
  device: mihomo-tun
  auto-route: true
  auto-redirect: {{TUN_AUTO_REDIRECT}}
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
# {{TUN_END}}

# RESTful controller used by the MetaCubeXD dashboard.
# Bound to 0.0.0.0 so LAN clients reach it at ${MIHOMO_IP}:${CONTROLLER_PORT}
# across the macvlan network. Leave secret empty in .env for no auth.
external-controller: 0.0.0.0:{{CONTROLLER_PORT}}
secret: "{{CONTROLLER_SECRET}}"

# CORS allow-list for the controller API. The self-hosted MetaCubeXD dashboard is
# served from the NAS host (http://<NAS-IP>:${WEB_UI_PORT}) while the controller
# lives on the mihomo macvlan IP:port — a DIFFERENT browser origin. Recent mihomo
# ships a RESTRICTIVE default allow-list (only the bundled/hosted dashboards), so a
# request from your own dashboard is rejected and MetaCubeXD reports "cannot connect
# to backend". Allow any origin here; the `secret` above still gates real API access.
# allow-private-network answers Chrome's Private Network Access preflight.
external-controller-cors:
  allow-origins:
    - '*'
  allow-private-network: true
# {{EXTUI_BEGIN}}
# Embedded static dashboard (Raspberry Pi bare-metal "lite" mode): mihomo serves the
# MetaCubeXD build from this folder at /ui on the controller port, replacing the
# separate dashboard container. The renderer keeps this fenced block ONLY when
# EXTERNAL_UI_DIR is set; the DSM compose path leaves it unset and the render is
# byte-identical to the template without this fence.
external-ui: "{{EXTERNAL_UI_DIR}}"
# {{EXTUI_END}}

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  # fake-ip is the standard mode for a TUN transparent gateway: mihomo answers DNS with
  # an address from the benchmark range below (RFC 2544 - NOT a real or user network) so
  # the TUN dataplane cleanly captures every connection by destination. The range is a
  # fixed mihomo constant, not a DNS server or your LAN.
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # Hosts that must NEVER receive fake-ip answers: in-container diagnostics and
  # the host-side recovery fetch (see docs - "provider has no nodes") need the
  # REAL addresses of the geodata mirror and the airport panel. The panel entry
  # is derived from subscription.txt at render time; an IP-literal subscription
  # host renders it as a comment instead.
  fake-ip-filter:
    - 'testingcf.jsdelivr.net'
    {{AIRPORT_FAKEIP_PIN}}
  # DNS servers are injected from .env as comma-separated lists -> YAML flow sequences.
  default-nameserver: [ {{DNS_DEFAULT_NAMESERVER}} ]
  # Bootstrap DNS pins: BEFORE any node is up, mihomo must fetch the node list
  # (the airport panel, derived from subscription.txt) and geodata (the CDN
  # mirror in geox-url below), and the health probes must reach the 204
  # endpoint. These usually sit on non-CN IPs, so the split-horizon
  # machinery below would otherwise route their resolution through a tunnel
  # that does not exist yet at cold start. A nameserver-policy match bypasses
  # the default nameserver entirely: these hosts resolve via the
  # domestic list, dialed direct, always (2026-07-12 provider outage).
  # www.gstatic.com: the delay probes (doctor --egress, validate_release) and
  # the COMPATIBLE placeholder an EMPTY group degrades to dial the 204 URL
  # DIRECT, so its lookup must never depend on the tunnel either.
  nameserver-policy:
    'testingcf.jsdelivr.net': [ {{DNS_NAMESERVER}} ]
    'www.gstatic.com': [ {{DNS_NAMESERVER}} ]
    {{AIRPORT_DNS_PIN}}
    # Split-horizon resolution (DNS privacy): a domain matching a key below is
    # resolved ONLY by that key's servers. CN domains resolve via the domestic
    # list, dialed DIRECT; the listed foreign categories resolve via overseas
    # servers TUNNELED through a proxy group - a '#All Nodes' suffix on a
    # server is mihomo's route-via-group syntax, and All Nodes is the LITERAL
    # hidden url-test group defined LAST under proxy-groups below, kept solely
    # as this DNS anchor (rename both together; the renderer AND CI validate
    # every '#group' fragment against the rendered inventory). Detouring via
    # All Nodes instead of the Routing Mode selector keeps resolution alive even
    # when an operator pins Routing Mode to DIRECT or the picked country group
    # empties to REJECT. These two entries and the foreign-by-default
    # core below render unconditionally - split-horizon v2 is the only DNS
    # profile, and both lists are REQUIRED in .env.
    'geosite:cn': [ {{DNS_CN_NAMESERVER}} ]
    'geosite:geolocation-!cn': [ {{DNS_FOREIGN_NAMESERVER}} ]
  # Proxy-server (airport node) hostnames resolve via the domestic list
  # DIRECTLY: node IPs are usually non-CN, so tunneled or filter-diverted
  # resolution dead-ends with "dns resolve failed" on every node BEFORE any
  # node is up (observed in production) - the same cold-start invariant as
  # the bootstrap pins above.
  proxy-server-nameserver: [ {{DNS_NAMESERVER}} ]
  # Split-horizon v2 (foreign-by-default): the DEFAULT resolver for every
  # domain NOT matched by nameserver-policy above is the tunneled foreign
  # list - the domestic operators never see long-tail hostnames at all (the
  # dnsleaktest.com finding: the old GEOIP lookups leaked them). There is
  # deliberately NO fallback here: a dead tunnel fails CLOSED (SERVFAIL)
  # instead of silently answering from a domestic resolver.
  nameserver: [ {{DNS_FOREIGN_NAMESERVER}} ]
# {{SNIFFER_BEGIN}}
# Sniffer (SNIFFER_ENABLE, default ON for new installs): recovers the REAL
# hostname from raw-IP flows via TLS SNI / HTTP Host / QUIC. LAN clients that
# resolve DNS outside the gateway (router-as-DNS via DHCP, browser DoH,
# Android Private DNS) produce hostname-less flows the GEOSITE rules cannot
# see - observed in production as facebook/netflix breaking while youtube
# survived. parse-pure-ip sniffs exactly those flows; override-destination
# replaces the client-resolved (possibly GFW-poisoned) address so the node
# re-dials by hostname remotely, which both restores domain routing (incl.
# the Streaming Unlock group) and neutralizes poisoned client-side answers.
# skip-domain carries the community-standard exclusions that break under
# SNI override (Xiaomi IoT keep-alive, Apple push).
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - 'Mijia Cloud'
    - '+.push.apple.com'
# {{SNIFFER_END}}

log-level: info

# Geo databases (needed by the GEOSITE/GEOIP rules below). Mihomo downloads these
# on first start; its default source is the big public Git host, which is blocked
# in mainland China, so the download hangs and the proxy never finishes starting.
# Point at a CDN mirror that is reachable there. The files are cached under the
# config dir after the first fetch, so later starts are instant. If this mirror is
# blocked for you, replace the hosts below.
geo-auto-update: false
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

# Proxy Providers
proxy-providers:
  my-airport:
    type: http
    url: "{{AIRPORT_URL}}"
    # Cache the fetched node list at a STABLE name (mihomo's default is an
    # opaque md5-of-URL filename). This file is what lets a restart come up
    # with nodes when a live fetch is impossible at that moment; it can also
    # be written directly by scripts/seed_provider.sh (see docs -
    # "provider has no nodes"). The renderer adopts a pre-existing md5-named
    # cache into this path on upgrade.
    path: ./proxies/my-airport.yaml
    interval: 3600
    health-check:
      enable: true
      interval: 600
      url: "http://www.gstatic.com/generate_204"

# Rule Providers (dynamic device policy, #63): two file-backed classical
# text rule sets consumed by the RULE-SET pair directly under the LAN rule
# below. The gateway panel is the ONLY writer (atomic tmp+rename, then a
# PUT /providers/rules/<name> reload); the container entrypoint seeds
# MISSING files zero-byte before `mihomo -t`, so every render is valid and
# the layer is fully INERT until entries appear (empty file = the rule
# matches nothing). The names and paths are the panel's permanent write
# contract - renaming either breaks every deployed panel.
rule-providers:
  dyn-full-direct:
    type: file
    behavior: classical
    format: text
    path: ./providers/dyn-full-direct.txt
  dyn-full-tunnel:
    type: file
    behavior: classical
    format: text
    path: ./providers/dyn-full-tunnel.txt

# Proxy Groups
# Rules can only target a proxy or a proxy-group (NEVER a proxy-provider), which is
# why the catch-all `MATCH,my-airport` crash-looped: `my-airport` is a proxy-provider,
# not a routable target. These groups consume that provider via `use:`; the MATCH rule
# below targets the Routing Mode group instead.
#
# Naming legend (documented once, here and in .env.example): "<X> Auto" = an
# auto-pick url-test group (fastest node within that country); the selectors
# carry FUNCTION names (#58) - Routing Mode (the master mode switch),
# Streaming Unlock (streaming-exit pinning), Exit Country (which country the
# proxy exits from), Full-Tunnel Devices (the per-device force-proxy band).
# Dashboard order = definition order (selectors first - the cards an
# operator actually touches; hidden machinery last).
proxy-groups:
  # Routing Mode: the dashboard-facing mode selector and the rule target
  # (GEOSITE/MATCH below). Defaults to Exit Country - a stable exit COUNTRY
  # instead of the old full-pool latency race that hopped exit countries and
  # tripped site bot-protection. An operator can pin one exact provider node
  # (surfaced via use: - the only complete fix when a site objects to
  # same-country IP hops too), force DIRECT (bypass), or REJECT (block)
  # from MetaCubeXD.
  - name: Routing Mode
    type: select
    proxies:
      - Exit Country
      - DIRECT
      - REJECT
    use:
      - my-airport

  # Streaming Unlock: per-service selector for unlock-sensitive SITES (the
  # GEOSITE rules below send netflix + the audio services here). First member
  # Routing Mode = day-one behavior is identical to a single-group config; pin
  # a streaming-unlock node - or a country auto group for one-click
  # Netflix-region pinning - from MetaCubeXD to move ONLY streaming traffic.
  - name: Streaming Unlock
    type: select
    proxies:
      - Routing Mode
# {{COUNTRY_MEMBERS_STREAMING}}
      - DIRECT
    use:
      - my-airport

  # Exit Country: choose the exit COUNTRY. Its members ARE the generated
  # "<Country> Auto" groups from COUNTRY_GROUPS (REQUIRED in .env - the
  # render refuses without it): the selected country's url-test holds ONE
  # node at a time, so general traffic keeps a single exit IP until that
  # group re-picks within the same country. Defaults to the FIRST
  # COUNTRY_GROUPS entry (.env.example ships Japan Auto first). No DIRECT/
  # REJECT here - bypass and block are Routing Mode decisions; an empty picked
  # group fails CLOSED (REJECT) rather than leaking.
  - name: Exit Country
    type: select
    proxies:
# {{COUNTRY_MEMBERS_PICK}}

  # Full-Tunnel Devices: strict per-device full-proxy. Renders
  # UNCONDITIONALLY since #63: it is the target of BOTH per-device tunnel
  # paths - the static FULL_PROXY_SOURCES band (SRC-IP-CIDR rules at the
  # band marker below the LAN rule) and the panel-written dyn-full-tunnel
  # rule set - so it can no longer be fenced on the band knob. Flows sent
  # here carry EVERYTHING except LAN destinations - streaming AND CN sites
  # included. Members deliberately exclude DIRECT: a tunneled device can
  # never be silently un-proxied - REJECT is the kill switch. Defaults to
  # Routing Mode (follows the dashboard mode); pick a country here to pin
  # the tunnel exit independently. Static-band membership changes ride a
  # router-side fixed-IP reservation flip + reconnect - never a gateway
  # restart (docs/configuration.md); dynamic membership is a panel write.
  - name: Full-Tunnel Devices
    type: select
    proxies:
      - Routing Mode
# {{COUNTRY_MEMBERS_FULL_PROXY}}
      - REJECT

# Generated "<Country> Auto" url-test groups: one per COUNTRY_GROUPS entry
# (fastest provider node matching the entry's regex; empty-fallback REJECT
# fails closed; tolerance avoids flapping between near-equal nodes; no own
# url:/interval: - the provider health check supplies the delay data).
# {{COUNTRY_GROUPS}}
  # All Nodes: full-pool url-test kept SOLELY as the DNS detour anchor - the
  # '#All Nodes' fragments in DNS_FOREIGN_NAMESERVER (every deployed .env)
  # ride it, so LAN-wide resolution never depends on a dashboard pick or a
  # filtered pool. hidden: true is a display flag only (MetaCubeXD filters
  # hidden groups); the group stays alive and routable. Rename or remove
  # ONLY together with every '#All Nodes' fragment - the renderer and CI
  # both validate the reference.
  - name: All Nodes
    type: url-test
    hidden: true
    use:
      - my-airport
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50

# Rules - deterministic domain routing first, IP fallthrough last.
rules:
  # Private/link-local destinations NEVER ride the tunnel. 'LAN' is hardcoded
  # in mihomo (RFC 1918 + loopback + link-local + multicast) and needs no geo
  # database, so this rule survives a failed geodata fetch; no-resolve is
  # mandatory - without it this top-of-chain GEOIP would force a lookup of
  # every domain flow before the GEOSITE rules run. Observed in production:
  # Windows Delivery Optimization peers at foreign RFC1918 addresses were
  # falling through to MATCH and riding the proxy.
  - 'GEOIP,LAN,DIRECT,no-resolve'
  # Dynamic device policy (#63): panel-written SRC-IP-CIDR entries live in
  # the file providers declared above. Spliced DIRECTLY under the LAN rule,
  # so dynamic policy outranks the static band below AND every domain rule
  # - and direct outranks tunnel (first match wins). Both providers seed
  # empty (the entrypoint guarantees the files exist), so with no panel
  # entries these two rules match nothing - zero behavior change.
  - 'RULE-SET,dyn-full-direct,DIRECT'
  - 'RULE-SET,dyn-full-tunnel,Full-Tunnel Devices'
  # Full-proxy band (FULL_PROXY_SOURCES, optional): one SRC-IP-CIDR line
  # per entry renders at the marker below - just under the dynamic
  # RULE-SET pair (which outranks the band; band devices still reach LAN
  # destinations DIRECT via the rule above) and ahead of every domain
  # rule, so band traffic can never match a DIRECT domain rule first.
  # Caveat: a UDP/QUIC flow whose exit node lacks UDP relay falls
  # through the SRC rule at the rule-engine layer - CN-listed destinations
  # then go DIRECT (browsers retry over proxied TCP; the doctor's
  # full_proxy check flags such flows). Unset renders nothing here.
# {{FULL_PROXY_RULES}}
  # The panel must never depend on a populated proxy group: newer mihomo
  # (>=1.19.x) routes its OWN provider pull through this rule engine, so on
  # a cold start with empty groups the pull would ride MATCH -> Routing Mode
  # -> (empty) REJECT and the subscription could never bootstrap (caught by
  # the 2026-07-22 staged validation; the DNS pins below only fix
  # resolution, not routing). Rendered from the subscription host exactly
  # like the DNS pins; an IPv4-literal host renders an IP-CIDR form
  # instead. Sits after the full-proxy band on purpose - band CLIENTS
  # still proxy the panel website; mihomo's own pull has no band source IP.
  {{AIRPORT_DIRECT_RULE}}
  # Streaming rides its own dashboard-pinnable group, ahead of everything so
  # neither DNS games nor the latency-optimal node choice can misroute it.
  # Audio streaming (Spotify et al.) is streaming too - region-locked
  # catalogs, same pinning needs. (each service is a subset of
  # geolocation-!cn - these rules must come first; apple-music is
  # deliberately absent: CN storefront risk, and youtube-music rides
  # geosite:youtube -> Routing Mode.)
  - 'GEOSITE,NETFLIX,Streaming Unlock'
  - 'GEOSITE,SPOTIFY,Streaming Unlock'
  - 'GEOSITE,TIDAL,Streaming Unlock'
  - 'GEOSITE,DEEZER,Streaming Unlock'
  - 'GEOSITE,SOUNDCLOUD,Streaming Unlock'
  - 'GEOSITE,CN,DIRECT'
  # Listed-foreign domains ride the proxy WITHOUT any local DNS resolution:
  # the GEOIP rule below never sees them - a privacy and a latency win.
  - 'GEOSITE,GEOLOCATION-!CN,Routing Mode'
  # GEOIP needs a destination IP, so by default mihomo RESOLVES every remaining
  # domain via the DNS chain above just to evaluate this rule. Under
  # split-horizon v2 that lookup rides the tunneled foreign list (private);
  # under the legacy profile it is exactly how the domestic resolvers got to
  # see long-tail foreign hostnames. Setting DNS_GEOIP_NO_RESOLVE=true in .env
  # renders a `,no-resolve` suffix here: the rule then matches only
  # connections that already carry an IP and never forces a lookup.
  # Trade-off: CN domains MISSED by geosite:cn above lose their direct
  # short-circuit and ride the proxy via MATCH instead.
  - 'GEOIP,CN,DIRECT{{GEOIP_NO_RESOLVE}}'
  - 'MATCH,Routing Mode'
